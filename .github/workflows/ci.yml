name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandas numpy scipy

      - name: Run test suite
        run: pytest tests/ -v --tb=short

      - name: Validate JSON files
        run: |
          python -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          python -c "import json; json.load(open('marketplace-entry.json'))"
          python -c "import json; json.load(open('package.json'))"
          python -c "import json; json.load(open('.mcp.json'))"

      - name: Verify all scripts compile
        run: |
          for script in scripts/*.py; do
            python -m py_compile "$script"
          done
